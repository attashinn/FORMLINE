        <text x="572" y="23" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#44efbc">COMPLETED</text>
        <text x="703" y="25" font-family="Inter, Arial, sans-serif" font-size="15" fill="#aeb6cf">$7,000 - $9,000</text>
        <text x="921" y="25" font-family="Inter, Arial, sans-serif" font-size="15" fill="#aeb6cf">2d ago</text>
        <text x="1088" y="25" font-family="Inter, Arial, sans-serif" font-size="15" fill="#aeb6cf">Open</text>
      </g>

      <g transform="translate(27 220)">
        <circle cx="20" cy="20" r="20" fill="#26342c"/>
        <text x="20" y="26" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#b46b47">N</text>
        <text x="54" y="15" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Northwood Studio</text>
        <text x="54" y="36" font-family="Inter, Arial, sans-serif" font-size="13" fill="#aeb6cf">Mara Cole</text>
        <text x="300" y="25" font-family="Inter, Arial, sans-serif" font-size="15" fill="#aeb6cf">Hospitality &amp; Travel</text>
