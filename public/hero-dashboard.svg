    <line x1="0" y1="60" x2="1200" y2="60" stroke="#24242b"/>
    <rect x="0" y="13" width="31" height="31" rx="10" fill="#ffffff"/>
    <text x="15.5" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#0a0a0b">F</text>
    <text x="43" y="33" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#f6f6f7">Formline</text>
    <text x="473" y="32" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Clients</text>
    <text x="555" y="32" font-family="Inter, Arial, sans-serif" font-size="15" fill="#898994">Forms</text>
    <text x="642" y="32" font-family="Inter, Arial, sans-serif" font-size="15" fill="#898994">Intake</text>
    <rect x="1045" y="8" width="104" height="41" rx="14" fill="#ffffff"/>
