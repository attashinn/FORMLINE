    <text x="0" y="64" font-family="Georgia, 'Times New Roman', serif" font-size="62" fill="#f6f6f7">Active</text>
    <text x="145" y="64" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-style="italic" fill="#a7a7ad">partnerships</text>
    <text x="0" y="104" font-family="Inter, Arial, sans-serif" font-size="19" fill="#b8bfd2">Oversee client onboarding, project requirements, and communication cycles</text>
