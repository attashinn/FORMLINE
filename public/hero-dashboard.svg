        <rect x="527" y="8" width="96" height="22" rx="11" fill="#3a3a40"/>
        <text x="575" y="23" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">IN PROGRESS</text>
        <text x="703" y="25" font-family="Inter, Arial, sans-serif" font-size="15" fill="#aeb6cf">$12,000 - $15,000</text>
        <text x="921" y="25" font-family="Inter, Arial, sans-serif" font-size="15" fill="#aeb6cf">12h ago</text>
        <text x="1088" y="25" font-family="Inter, Arial, sans-serif" font-size="15" fill="#aeb6cf">Open</text>
      </g>

      <g transform="translate(27 143)">
        <circle cx="20" cy="20" r="20" fill="#f4ead8"/>
        <text x="20" y="26" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#111015">L</text>
        <text x="54" y="15" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Lumina Skincare</text>
        <text x="54" y="36" font-family="Inter, Arial, sans-serif" font-size="13" fill="#aeb6cf">Sasha Reyes</text>
        <text x="300" y="25" font-family="Inter, Arial, sans-serif" font-size="15" fill="#aeb6cf">E-commerce</text>
