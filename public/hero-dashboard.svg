<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1904 940" role="img" aria-labelledby="title desc">
  <title id="title">Formline clients dashboard</title>
  <desc id="desc">A dark SaaS client dashboard with active partnership metrics, filters, and a client table.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f0f12"/>
      <stop offset="0.42" stop-color="#09090b"/>
      <stop offset="1" stop-color="#111015"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="10%" r="65%">
      <stop offset="0" stop-color="#7c5cff" stop-opacity=".22"/>
      <stop offset=".55" stop-color="#7c5cff" stop-opacity=".04"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="1904" height="940" fill="url(#bg)"/>
  <rect width="1904" height="940" fill="url(#glow)"/>

  <g transform="translate(352 0)">
